<div class="login-page">

  <div class="login-card">

    <div class="header">
      <img src="ico-liceo-big.png" alt="Logo">
      <h1>Liceo VisiTrack</h1>
      <p>Secure access for staff only</p>
    </div>

    <form (ngSubmit)="login()">

      @if (error()) {
        <div class="error-box">
          <span class="dot"></span>
          {{ error() }}
        </div>
      }

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Enter your email"
            required>
          <span class="icon">✉️</span>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter password"
            required>
          <button
            type="button"
            class="toggle-pw"
            (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading()" [class.loading]="isLoading()">
        {{ isLoading() ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

    <nav>
      <a class="visitor-access" routerLink="/">&#9679; Visitor Form</a>
    </nav>

  </div>

</div>
