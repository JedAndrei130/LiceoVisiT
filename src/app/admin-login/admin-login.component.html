<div class="login-page">

  <div class="login-card">

    <div class="header">

      <img src="liceo_logo.png" alt="Logo">

      <h1>Liceo VisiTrack</h1>

      <p>Secure access for staff only</p>

    </div>

    <form (ngSubmit)="login()">

      <div *ngIf="error" class="error-box">
        <span class="dot"></span>
        {{error}}
      </div>

      <div class="form-group">

        <label>Username</label>

        <div class="input-wrapper">
          <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter your username"
          required>
          <span class="icon">👤</span>
        </div>

      </div>

      <div class="form-group">

        <label>Password</label>

        <div class="input-wrapper">
          <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter password"
          required>
          <span class="icon">🔒</span>
        </div>

      </div>

      <button type="submit" class="login-btn">
        Sign In
      </button>

    </form>

    <div class="footer">
      Default credentials: admin / admin123
    </div>

  </div>

</div>
