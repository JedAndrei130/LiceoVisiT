<div class="dashboard-container">

  <app-sidebar></app-sidebar>

  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">

      <h2>User Management</h2>

      <div class="top-actions">
        <button class="add-btn" (click)="openAdd()">+ Add User</button>

        <div class="user-icon">👤</div>
      </div>

    </header>

    <!-- CONTENT -->
    <main class="content">

      <!-- STATS (optional but consistent with dashboard style) -->
      <div class="stats">

        <div class="stat-card red">
          <p>Total Users</p>
          <h1>{{ users.length }}</h1>
        </div>

        <div class="stat-card green">
          <p>Active Users</p>
          <h1>{{ users.length }}</h1>
        </div>

        <div class="stat-card orange">
          <p>Recent Additions</p>
          <h1>{{ users.length }}</h1>
        </div>

      </div>

      <!-- TABLE SECTION -->
      <div class="recent-visits">

        <div class="table-header">

          <div>
            <h3>Users List</h3>
            <p>Manage registered users</p>
          </div>

        </div>

        <table>

          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Position</th>
              <th>Date Created</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody>

            <tr *ngIf="users.length === 0">
              <td colspan="5" class="empty">
                No users found.
              </td>
            </tr>

            <tr *ngFor="let user of users">
              <td>{{ user.name }}</td>
              <td>{{ user.email }}</td>
              <td>{{ user.position }}</td>
              <td>{{ user.createdDate }}</td>
              <td>
                <button (click)="edit(user)">Edit</button>
                <button (click)="delete(user.id)">Delete</button>
              </td>
            </tr>

          </tbody>

        </table>

      </div>

    </main>

  </div>

</div>
